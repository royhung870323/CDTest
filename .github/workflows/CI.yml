name: CICD
on: [push]
permissions:
    contents: read
    packages: write
jobs: 
    CI:
        runs-on: ubuntu-latest
        env:
            Sln: CDTest.sln
            Configuration: Release
        steps:
            - name: 步驟 1 - 下載程式碼到執行環境
              uses: actions/checkout@v4

            - name: 步驟 2 - 安裝 .NET SDK
              uses: actions/setup-dotnet@v4
              with:
                dotnet-version: 8.0.x

            - name: 步驟 3 - 還原依賴 (Restore)
              run: dotnet restore ${{ env.Sln }}

            - name: 步驟 4 - 編譯專案 (Build)
              run: dotnet build ${{ env.Sln }} --configuration ${{ env.Configuration }} --no-restore

            - name: 步驟 5 - 執行單元測試 (Test)
              run: dotnet test ${{ env.Sln }} --configuration ${{ env.Configuration }} --no-build --verbosity normal

            - name: 步驟 6 - 發行專案 (Publish)
              # 指定只 publish Web 專案，並輸出到 publish 資料夾
              run: dotnet publish CDTest/CDTest.csproj -c ${{ env.Configuration }} -o ./publish

            - name: 步驟 7 - 上傳成品 (Upload Artifact)
              uses: actions/upload-artifact@v4
              with:
                name: CDTest # 成品的名稱
                path: ./publish # 要上傳的資料夾路徑
